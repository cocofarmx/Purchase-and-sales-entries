<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>CocoFarmX</title>
<meta name="application-name" content="CocoFarmX"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="CocoFarmX"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#1e293b"/>
<link rel="manifest" id="pwa-manifest"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
html{-webkit-text-size-adjust:100%;}

:root{
  --bg:#060e1e;
  --bg2:#091525;
  --surface:#0d1e35;
  --surface2:#112545;
  --border:rgba(255,255,255,0.08);
  --border2:rgba(255,255,255,0.14);
  --border3:rgba(255,255,255,0.22);
  --text:#e8f0fe;
  --text2:#9ab4d4;
  --muted:#4d7098;
  --muted2:#2d4a66;
  --primary:#3b82f6;
  --primary-d:#1d4ed8;
  --primary-glow:rgba(59,130,246,0.3);
  --accent:#22d3ee;
  --success:#10b981;
  --success-d:#059669;
  --warning:#f59e0b;
  --danger:#f43f5e;
  --purple:#8b5cf6;
  --orange:#f97316;
  --pl:rgba(59,130,246,0.1);
  --sl:rgba(16,185,129,0.1);
  --dl:rgba(244,63,94,0.1);
  --wl:rgba(245,158,11,0.1);
  --ph:#2563eb;
  --ss:0 2px 8px rgba(0,0,0,0.5);
  --sm:0 6px 20px rgba(0,0,0,0.5);
  --sl2:0 16px 48px rgba(0,0,0,0.6);
  --r:14px;
  --rs:9px;
  --r2:18px;
  --fh:'Syne',sans-serif;
  --fb:'DM Sans',sans-serif;
}

body{
  font-family:var(--fb);
  background:var(--bg);
  color:var(--text);
  min-height:100%;
  overflow:hidden;
}

::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:4px;}

/* ===== LOGIN ===== */
.login-wrap{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse 120% 100% at 40% 0%,#0f2a5e 0%,var(--bg) 55%),
             radial-gradient(ellipse 60% 50% at 85% 90%,#062033 0%,transparent 60%);
  z-index:999;overflow-y:auto;padding:20px;
}
.login-card{
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:22px;
  padding:44px 38px;
  width:100%;max-width:400px;
  box-shadow:0 0 0 1px rgba(255,255,255,0.04),var(--sl2);
}
.login-logo{text-align:center;margin-bottom:32px;}
.login-logo .mark{
  width:60px;height:60px;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  border-radius:18px;
  display:flex;align-items:center;justify-content:center;
  font-size:26px;margin:0 auto 14px;
  box-shadow:0 6px 24px var(--primary-glow);
}
.login-logo h1{
  font-family:var(--fh);font-size:1.5rem;font-weight:800;
  background:linear-gradient(135deg,#fff,var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.login-logo p{font-size:0.8rem;color:var(--muted);margin-top:5px;}
.login-field{margin-bottom:16px;}
.login-field label{display:block;font-size:0.72rem;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;color:var(--text2);margin-bottom:7px;}
.login-field input{
  width:100%;padding:12px 14px;
  background:var(--bg2);
  border:1px solid var(--border2);
  border-radius:var(--rs);
  font-family:var(--fb);font-size:0.92rem;color:var(--text);outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.login-field input::placeholder{color:var(--muted2);}
.login-field input:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow);}
.login-err{background:var(--dl);border:1px solid rgba(244,63,94,0.25);color:#fca5a5;padding:10px 13px;border-radius:var(--rs);font-size:0.82rem;font-weight:500;margin-bottom:14px;display:none;}
.login-err.show{display:block;}
.btn-login{
  width:100%;padding:13px;margin-top:4px;
  background:linear-gradient(135deg,var(--primary),var(--primary-d));
  color:#fff;border:none;border-radius:var(--rs);
  font-family:var(--fb);font-size:0.93rem;font-weight:700;
  cursor:pointer;transition:all 0.2s;
  box-shadow:0 4px 18px var(--primary-glow);
}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 7px 24px var(--primary-glow);}
.btn-login:active{transform:scale(0.98);}
.btn-login:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

/* ===== COMPANY PAGE ===== */
.company-card{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:18px;padding:32px 20px;text-align:center;cursor:pointer;
  transition:all 0.25s;
}
.company-card:hover{transform:translateY(-5px);border-color:var(--primary);box-shadow:0 16px 48px rgba(0,0,0,0.5),0 0 24px var(--primary-glow);}
.company-card .cc-icon{font-size:3rem;margin-bottom:12px;display:block;}
.company-card .cc-name{font-family:var(--fh);font-size:1.1rem;font-weight:700;color:var(--text);margin-bottom:6px;}
.company-card .cc-btn{display:inline-block;margin-top:14px;padding:8px 24px;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;border-radius:var(--rs);font-family:var(--fb);font-size:0.8rem;font-weight:700;border:none;cursor:pointer;box-shadow:0 3px 12px var(--primary-glow);}
.company-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:0.75rem;font-weight:600;background:var(--pl);color:#93c5fd;border:1px solid rgba(59,130,246,0.2);}

/* ===== LAYOUT ===== */
.layout{display:flex;min-height:100vh;}

/* ===== SIDEBAR ===== */
.sidebar{
  width:260px;background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  position:fixed;top:0;left:0;height:100%;z-index:150;
  transition:transform 0.28s cubic-bezier(.4,0,.2,1);
  overflow-y:auto;overflow-x:hidden;
}
.sidebar-logo{padding:20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.logo-mark{width:34px;height:34px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;box-shadow:0 3px 10px var(--primary-glow);}
.logo-text{font-family:var(--fh);font-size:0.88rem;font-weight:700;color:var(--text);line-height:1.2;}
.logo-text span{display:block;font-family:var(--fb);font-size:0.62rem;font-weight:400;color:var(--muted);margin-top:1px;}

.module-switcher{padding:12px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:3px;}
.mod-btn{
  width:100%;padding:9px 12px;
  background:transparent;border:1px solid transparent;
  border-radius:var(--rs);
  font-family:var(--fb);font-size:0.78rem;font-weight:600;
  color:var(--muted);cursor:pointer;transition:all 0.18s;
  text-align:left;display:flex;align-items:center;gap:8px;
}
.mod-btn:hover{background:var(--surface2);color:var(--text2);border-color:var(--border);}
.mod-btn.active,
.mod-btn.husk.active{background:rgba(59,130,246,0.12);border-color:rgba(59,130,246,0.3);color:var(--text);}
.mod-btn.cocopeat.active{background:rgba(16,185,129,0.12);border-color:rgba(16,185,129,0.3);color:var(--text);}
.mod-btn.machexp.active{background:rgba(245,158,11,0.12);border-color:rgba(245,158,11,0.3);color:var(--text);}

.sidebar-nav{flex:1;padding:10px 8px;overflow-y:auto;}
.nav-label{font-size:0.6rem;font-weight:700;color:var(--muted2);letter-spacing:1.5px;text-transform:uppercase;padding:10px 8px 5px;}
.nav-item{
  width:100%;padding:9px 12px;margin-bottom:2px;
  background:transparent;border:none;border-radius:var(--rs);
  font-family:var(--fb);font-size:0.82rem;font-weight:500;
  color:var(--muted);cursor:pointer;transition:all 0.15s;
  text-align:left;display:flex;align-items:center;gap:9px;
}
.nav-item:hover{background:var(--surface2);color:var(--text2);}
.nav-item.active{background:rgba(59,130,246,0.1);color:var(--text);border-left:2px solid var(--primary);padding-left:10px;}
.ni{font-size:0.95rem;width:20px;text-align:center;flex-shrink:0;}

.veh-panel{border-top:1px solid var(--border);padding:10px;}
.veh-panel-title{font-size:0.6rem;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:1px;padding:4px 6px 8px;}
.veh-list{display:flex;flex-direction:column;gap:4px;max-height:200px;overflow-y:auto;}
.veh-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);padding:7px 10px;}
.veh-item .vn{font-family:'JetBrains Mono',monospace;font-size:0.72rem;font-weight:700;color:var(--accent);}
.veh-item .vo{font-size:0.68rem;color:var(--muted);margin-top:1px;}
.veh-item .vc{font-size:0.68rem;font-weight:700;color:var(--success);margin-top:1px;}

.sidebar-footer{padding:12px;border-top:1px solid var(--border);background:var(--bg2);}
.user-info{display:flex;align-items:center;gap:10px;}
.user-avatar{width:33px;height:33px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;display:flex;align-items:center;justify-content:center;font-size:0.78rem;font-weight:700;flex-shrink:0;}
.user-details{flex:1;min-width:0;}
.user-name{font-size:0.8rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-role{font-size:0.66rem;color:var(--muted);}
.logout-btn{background:var(--bg2);border:1px solid var(--border2);cursor:pointer;color:var(--muted);font-size:1rem;padding:5px 8px;border-radius:7px;transition:all 0.2s;}
.logout-btn:hover{color:var(--danger);border-color:rgba(244,63,94,0.3);}

/* ===== TOPBAR ===== */
.main{margin-left:260px;flex:1;min-width:0;display:flex;flex-direction:column;height:100vh;overflow-y:auto;overflow-x:hidden;background:var(--bg);}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 22px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-shrink:0;}
.topbar-title{font-family:var(--fh);font-size:0.95rem;font-weight:700;color:var(--text);}
.topbar-actions{display:flex;gap:8px;}

/* ===== CONTENT ===== */
.content{padding:20px 22px;flex:1;overflow-x:hidden;}

/* ===== CARDS ===== */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--ss);margin-bottom:16px;overflow:hidden;}
.card-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.card-title{font-family:var(--fh);font-size:0.86rem;font-weight:700;color:var(--text);}
.card-body{padding:18px;}

/* ===== STATS ===== */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--ss);position:relative;overflow:hidden;transition:transform 0.2s,box-shadow 0.2s;}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--sm);}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.sc-blue::before{background:linear-gradient(90deg,var(--primary),var(--accent));}
.sc-green::before{background:linear-gradient(90deg,var(--success),#34d399);}
.sc-orange::before{background:linear-gradient(90deg,var(--warning),var(--orange));}
.sc-purple::before{background:linear-gradient(90deg,var(--purple),var(--primary));}
.si{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:0.95rem;margin-bottom:10px;}
.si-b{background:var(--pl);}
.si-g{background:var(--sl);}
.si-o{background:var(--wl);}
.si-p{background:rgba(139,92,246,0.1);}
.sv{font-family:var(--fh);font-size:1.6rem;font-weight:800;line-height:1;margin-bottom:3px;color:var(--text);}
.sl{font-size:0.7rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;}
.ss2{font-size:0.65rem;color:var(--muted2);margin-top:2px;}

/* ===== FORMS ===== */
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:13px;}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:0.7rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;}
.field input,.field select{padding:10px 12px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rs);font-family:var(--fb);font-size:0.86rem;color:var(--text);outline:none;transition:all 0.2s;}
.field input::placeholder{color:var(--muted2);}
.field select option{background:#0d1e35;color:var(--text);}
.field input:focus,.field select:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow);background:rgba(59,130,246,0.05);}
.field input:read-only{background:var(--surface2);color:var(--muted);}
.req{color:var(--danger);}

/* ===== BUTTONS ===== */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--rs);border:none;font-family:var(--fb);font-size:0.81rem;font-weight:600;cursor:pointer;transition:all 0.18s;white-space:nowrap;}
.btn:active{transform:scale(0.97);}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-d));color:#fff;box-shadow:0 3px 12px var(--primary-glow);}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 5px 18px var(--primary-glow);}
.btn-secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border2);}
.btn-secondary:hover{background:var(--bg2);color:var(--text);border-color:var(--border3);}
.btn-success{background:linear-gradient(135deg,var(--success),var(--success-d));color:#fff;box-shadow:0 3px 12px rgba(16,185,129,0.25);}
.btn-success:hover{transform:translateY(-1px);}
.btn-danger{background:linear-gradient(135deg,var(--danger),#e11d48);color:#fff;box-shadow:0 3px 12px rgba(244,63,94,0.25);}
.btn-danger:hover{transform:translateY(-1px);}
.btn-warning{background:linear-gradient(135deg,var(--warning),var(--orange));color:#fff;}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);padding:5px 9px;}
.btn-ghost:hover{background:var(--surface2);color:var(--text2);}
.btn-sm{padding:5px 12px;font-size:0.75rem;}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none!important;}

/* ===== TABLES ===== */
.table-toolbar{padding:11px 15px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--border);}
.search-bar{display:flex;align-items:center;gap:7px;padding:8px 12px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rs);transition:all 0.2s;}
.search-bar:focus-within{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow);}
.search-bar input{border:none;outline:none;font-family:var(--fb);font-size:0.84rem;color:var(--text);background:transparent;width:170px;}
.search-bar input::placeholder{color:var(--muted2);}
.filter-select{padding:7px 11px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rs);font-family:var(--fb);font-size:0.81rem;color:var(--text);outline:none;cursor:pointer;}
.filter-select:focus{border-color:var(--primary);}
.filter-select option{background:#0d1e35;}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
thead tr{background:rgba(255,255,255,0.02);}
th{padding:9px 13px;text-align:left;font-size:0.63rem;font-weight:700;color:var(--muted);letter-spacing:0.8px;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:11px 13px;font-size:0.84rem;border-bottom:1px solid var(--border);color:var(--text2);}
tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:rgba(59,130,246,0.04);color:var(--text);}
.sno{font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:var(--muted2);}
.vbadge{display:inline-flex;padding:2px 9px;border-radius:20px;font-size:0.71rem;font-weight:700;font-family:'JetBrains Mono',monospace;background:rgba(34,211,238,0.1);color:var(--accent);border:1px solid rgba(34,211,238,0.2);}
.cft-badge{display:inline-flex;padding:2px 9px;border-radius:20px;font-size:0.71rem;font-weight:700;background:var(--sl);color:var(--success);border:1px solid rgba(16,185,129,0.2);}
.name-cell{font-weight:600;color:var(--text);}
.time-cell{font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:var(--muted);}
.badge{display:inline-flex;padding:2px 9px;border-radius:20px;font-size:0.71rem;font-weight:600;}
.badge-cash{background:rgba(16,185,129,0.1);color:#6ee7b7;border:1px solid rgba(16,185,129,0.2);}
.badge-account{background:var(--pl);color:#93c5fd;border:1px solid rgba(59,130,246,0.2);}
.present-badge{background:var(--sl);color:#6ee7b7;border:1px solid rgba(16,185,129,0.2);display:inline-flex;padding:2px 9px;border-radius:20px;font-size:0.71rem;font-weight:600;}
.absent-badge{background:var(--dl);color:#fca5a5;border:1px solid rgba(244,63,94,0.2);display:inline-flex;padding:2px 9px;border-radius:20px;font-size:0.71rem;font-weight:600;}
.advance-badge{background:var(--wl);color:#fcd34d;border:1px solid rgba(245,158,11,0.2);display:inline-flex;padding:2px 9px;border-radius:20px;font-size:0.71rem;font-weight:600;}
.role-badge{display:inline-block;padding:2px 8px;border-radius:5px;font-size:0.67rem;font-weight:700;}
.rb-admin{background:rgba(245,158,11,0.1);color:#fcd34d;}
.rb-user{background:var(--pl);color:#93c5fd;}
.active-badge{display:inline-block;padding:2px 8px;border-radius:5px;font-size:0.67rem;font-weight:700;}
.ab-yes{background:var(--sl);color:#6ee7b7;}
.ab-no{background:var(--dl);color:#fca5a5;}

/* ===== PAGINATION ===== */
.pagination{padding:11px 15px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);flex-wrap:wrap;gap:8px;}
.page-info{font-size:0.73rem;color:var(--muted);}
.pg-btn,.page-btn{min-width:29px;height:29px;display:inline-flex;align-items:center;justify-content:center;border-radius:7px;border:1px solid var(--border2);background:var(--bg2);font-size:0.76rem;font-weight:600;cursor:pointer;transition:all 0.15s;color:var(--text2);margin:0 2px;}
.pg-btn:hover,.page-btn:hover{border-color:var(--primary);color:var(--primary);}
.pg-btn.active,.page-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.page-btn:disabled{opacity:0.3;cursor:not-allowed;}

/* ===== MODALS ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity 0.22s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r2);box-shadow:var(--sl2);width:100%;max-width:520px;transform:translateY(16px);transition:transform 0.25s cubic-bezier(.16,1,.3,1);}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:var(--fh);font-size:0.9rem;font-weight:700;color:var(--text);}
.modal-close{background:var(--bg2);border:1px solid var(--border2);cursor:pointer;color:var(--muted);font-size:0.88rem;padding:4px 8px;border-radius:7px;transition:all 0.15s;}
.modal-close:hover{color:var(--danger);}
.modal-body{padding:20px;}
.modal-footer{padding:13px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:9px;}

/* ===== TAB BAR ===== */
.tab-bar{display:flex;gap:4px;padding:10px 14px;border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;}

  background:linear-gradient(135deg,rgba(59,130,246,0.15),rgba(6,182,212,0.08));
  color:var(--text);
  border-left:2px solid var(--primary);
  padding-left:10px;
}
.ni{font-size:1rem;width:20px;text-align:center;flex-shrink:0;}

/* Sidebar footer */
.sidebar-footer{
  padding:14px 12px;
  border-top:1px solid var(--border);
  background:rgba(5,13,26,0.5);
}
.user-info{display:flex;align-items:center;gap:10px;}
.user-avatar{
  width:34px;height:34px;border-radius:50%;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-size:0.8rem;font-weight:700;flex-shrink:0;
  box-shadow:0 2px 8px var(--primary-glow);
}
.user-details{flex:1;min-width:0;}
.user-name{font-size:0.8rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-role{font-size:0.67rem;color:var(--muted);}
.logout-btn{
  background:var(--glass);border:1px solid var(--border2);
  cursor:pointer;color:var(--muted);font-size:1rem;
  padding:6px;border-radius:8px;transition:all 0.2s;
}
.logout-btn:hover{color:var(--danger);border-color:rgba(244,63,94,0.3);background:var(--dl);}

/* Vehicle panel */
.veh-panel{border-top:1px solid var(--border);padding:10px 10px;}
.veh-panel-title{font-size:0.6rem;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:1px;padding:4px 8px 8px;}
.veh-list{display:flex;flex-direction:column;gap:4px;max-height:200px;overflow-y:auto;}
.veh-item{background:var(--glass);border:1px solid var(--border);border-radius:var(--rs);padding:8px 10px;cursor:default;}
.veh-item .vn{font-family:'JetBrains Mono',monospace;font-size:0.72rem;font-weight:700;color:var(--accent);}
.veh-item .vo{font-size:0.68rem;color:var(--muted);margin-top:1px;}
.veh-item .vc{font-size:0.68rem;font-weight:700;color:var(--success);margin-top:1px;}

/* ===== TOPBAR ===== */
.main{margin-left:260px;flex:1;min-width:0;display:flex;flex-direction:column;height:100vh;overflow-y:auto;overflow-x:hidden;background:linear-gradient(180deg,#071020 0%,#050d1a 100%);}
.topbar{
  background:#0a1628;
  border-bottom:1px solid rgba(255,255,255,0.1);
  padding:0 24px;height:58px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;flex-shrink:0;
}
.topbar-title{
  font-family:var(--font-head);
  font-size:1rem;font-weight:700;color:var(--text);
}
.topbar-actions{display:flex;gap:8px;}

/* ===== CONTENT ===== */
.content{padding:20px 24px;flex:1;overflow-x:hidden;}

/* ===== CARDS ===== */
.card{
  background:#0d1b2e;
  border:1px solid rgba(255,255,255,0.08);
  border-radius:var(--r);
  box-shadow:var(--ss);
  margin-bottom:16px;
  overflow:hidden;
}
.card-header{
  padding:16px 20px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:8px;
}
.card-title{
  font-family:var(--font-head);
  font-size:0.88rem;font-weight:700;color:var(--text);
}
.card-body{padding:20px;}

/* ===== STATS ===== */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.stat-card{
  background:#0d1b2e;
  border:1px solid rgba(255,255,255,0.08);
  border-radius:var(--r);padding:18px;
  box-shadow:var(--ss);position:relative;overflow:hidden;
  transition:transform 0.2s,box-shadow 0.2s;
}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--sm);}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.sc-blue::before{background:linear-gradient(90deg,var(--primary),var(--accent));}
.sc-green::before{background:linear-gradient(90deg,var(--success),#34d399);}
.sc-orange::before{background:linear-gradient(90deg,var(--warning),var(--orange));}
.sc-purple::before{background:linear-gradient(90deg,var(--purple),var(--primary));}
.si{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;margin-bottom:12px;}
.si-b{background:var(--pl);}
.si-g{background:var(--sl);}
.si-o{background:var(--wl);}
.si-p{background:rgba(139,92,246,0.1);}
.sv{font-family:var(--font-head);font-size:1.7rem;font-weight:800;line-height:1;margin-bottom:3px;color:var(--text);}
.sl{font-size:0.72rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;}
.ss2{font-size:0.65rem;color:var(--muted2);margin-top:2px;}

/* ===== FORMS ===== */
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(195px,1fr));gap:14px;}
.field{display:flex;flex-direction:column;gap:6px;}
.field label{font-size:0.72rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;}
.field input,.field select{
  padding:10px 13px;
  background:var(--glass2);
  border:1px solid var(--border2);
  border-radius:var(--rs);
  font-family:var(--font-body);font-size:0.87rem;
  color:var(--text);outline:none;
  transition:all 0.2s;
}
.field input::placeholder{color:var(--muted2);}
.field select option{background:#0d1b2e;color:var(--text);}
.field input:focus,.field select:focus{
  border-color:var(--primary);
  background:rgba(59,130,246,0.08);
  box-shadow:0 0 0 3px var(--primary-glow);
}
.field input:read-only{background:var(--glass);color:var(--muted);cursor:default;}
.req{color:var(--danger);}

/* ===== BUTTONS ===== */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:9px 18px;border-radius:var(--rs);border:none;
  font-family:var(--font-body);font-size:0.82rem;font-weight:600;
  cursor:pointer;transition:all 0.2s;white-space:nowrap;
}
.btn:active{transform:scale(0.97);}
.btn-primary{
  background:linear-gradient(135deg,var(--primary),var(--primary-deep));
  color:#fff;box-shadow:0 4px 14px var(--primary-glow);
}
.btn-primary:hover{box-shadow:0 6px 20px var(--primary-glow);transform:translateY(-1px);}
.btn-secondary{
  background:var(--glass2);color:var(--text2);
  border:1px solid var(--border2);
}
.btn-secondary:hover{background:var(--glass3);color:var(--text);border-color:var(--border3);}
.btn-success{
  background:linear-gradient(135deg,var(--success),#059669);
  color:#fff;box-shadow:0 4px 14px var(--success-glow);
}
.btn-success:hover{transform:translateY(-1px);box-shadow:0 6px 20px var(--success-glow);}
.btn-danger{
  background:linear-gradient(135deg,var(--danger),#e11d48);
  color:#fff;box-shadow:0 4px 14px var(--danger-glow);
}
.btn-danger:hover{transform:translateY(-1px);}
.btn-warning{
  background:linear-gradient(135deg,var(--warning),var(--orange));
  color:#fff;box-shadow:0 4px 14px var(--warning-glow);
}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);padding:6px 10px;}
.btn-ghost:hover{background:var(--glass2);color:var(--text2);border-color:var(--border2);}
.btn-sm{padding:6px 13px;font-size:0.76rem;}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none!important;}

/* ===== TABLES ===== */
.table-toolbar{
  padding:12px 16px;display:flex;align-items:center;gap:8px;
  flex-wrap:wrap;border-bottom:1px solid var(--border);
}
.search-bar{
  display:flex;align-items:center;gap:8px;
  padding:8px 13px;
  background:var(--glass2);
  border:1px solid var(--border2);
  border-radius:var(--rs);
  transition:all 0.2s;
}
.search-bar:focus-within{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow);}
.search-bar input{
  border:none;outline:none;
  font-family:var(--font-body);font-size:0.85rem;
  color:var(--text);background:transparent;width:175px;
}
.search-bar input::placeholder{color:var(--muted2);}
.filter-select{
  padding:8px 12px;
  background:var(--glass2);
  border:1px solid var(--border2);
  border-radius:var(--rs);
  font-family:var(--font-body);font-size:0.82rem;
  color:var(--text);outline:none;cursor:pointer;
  transition:border-color 0.2s;
}
.filter-select:focus{border-color:var(--primary);}
.filter-select option{background:#0d1b2e;}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
thead tr{background:rgba(255,255,255,0.02);}
th{
  padding:10px 14px;text-align:left;
  font-size:0.65rem;font-weight:700;
  color:var(--muted);letter-spacing:1px;
  text-transform:uppercase;
  border-bottom:1px solid var(--border);white-space:nowrap;
}
td{padding:12px 14px;font-size:0.85rem;border-bottom:1px solid var(--border);color:var(--text2);}
tr:last-child td{border-bottom:none;}
tbody tr{transition:background 0.15s;}
tbody tr:hover td{background:rgba(59,130,246,0.04);color:var(--text);}
.sno{font-family:'JetBrains Mono',monospace;font-size:0.72rem;color:var(--muted2);}
.vbadge{
  display:inline-flex;padding:3px 10px;border-radius:20px;
  font-size:0.72rem;font-weight:700;font-family:'JetBrains Mono',monospace;
  background:rgba(59,130,246,0.12);color:var(--accent);
  border:1px solid rgba(59,130,246,0.2);
}
.cft-badge{
  display:inline-flex;padding:3px 10px;border-radius:20px;
  font-size:0.72rem;font-weight:700;
  background:var(--sl);color:var(--success);
  border:1px solid rgba(16,185,129,0.2);
}
.name-cell{font-weight:600;color:var(--text);}
.time-cell{font-family:'JetBrains Mono',monospace;font-size:0.76rem;color:var(--muted);}

/* BADGES */
.badge{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:0.72rem;font-weight:700;}
.badge-cash{background:rgba(16,185,129,0.12);color:#34d399;border:1px solid rgba(16,185,129,0.2);}
.badge-account{background:rgba(59,130,246,0.12);color:#60a5fa;border:1px solid rgba(59,130,246,0.2);}
.present-badge{background:var(--sl);color:var(--success);border:1px solid rgba(16,185,129,0.2);}
.absent-badge{background:var(--dl);color:#fda4af;border:1px solid rgba(244,63,94,0.2);}
.advance-badge{background:var(--wl);color:#fcd34d;border:1px solid rgba(245,158,11,0.2);}
.role-badge{display:inline-block;padding:3px 9px;border-radius:6px;font-size:0.67rem;font-weight:700;}
.rb-admin{background:rgba(245,158,11,0.12);color:#fcd34d;}
.rb-user{background:var(--pl);color:#93c5fd;}
.active-badge{display:inline-block;padding:3px 9px;border-radius:6px;font-size:0.67rem;font-weight:700;}
.ab-yes{background:var(--sl);color:#6ee7b7;}
.ab-no{background:var(--dl);color:#fda4af;}

/* PAGINATION */
.pagination{
  padding:12px 16px;
  display:flex;align-items:center;justify-content:space-between;
  border-top:1px solid var(--border);flex-wrap:wrap;gap:8px;
}
.page-info{font-size:0.74rem;color:var(--muted);}
.page-btns,.pg-btn{display:inline-flex;}
.pg-btn{
  min-width:30px;height:30px;
  display:inline-flex;align-items:center;justify-content:center;
  border-radius:8px;border:1px solid var(--border2);
  background:var(--glass);font-size:0.78rem;font-weight:600;
  cursor:pointer;transition:all 0.15s;color:var(--text2);
  margin:0 2px;
}
.pg-btn:hover{border-color:var(--primary);color:var(--primary);}
.pg-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.page-btn{
  min-width:30px;height:30px;
  display:inline-flex;align-items:center;justify-content:center;
  border-radius:8px;border:1px solid var(--border2);
  background:var(--glass);font-size:0.78rem;font-weight:600;
  cursor:pointer;transition:all 0.15s;color:var(--text2);margin:0 2px;
}
.page-btn:hover{border-color:var(--primary);color:var(--primary);}
.page-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.page-btn:disabled{opacity:0.3;cursor:not-allowed;}

/* ===== MODALS ===== */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  z-index:200;display:flex;align-items:center;justify-content:center;
  padding:20px;opacity:0;pointer-events:none;transition:opacity 0.25s;
}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{
  background:#0d1b2e;
  border:1px solid rgba(255,255,255,0.12);
  border-radius:var(--r2);
  box-shadow:var(--sl2);
  width:100%;max-width:520px;
  transform:translateY(20px) scale(0.97);
  transition:transform 0.25s cubic-bezier(.16,1,.3,1);
}
.modal-overlay.open .modal{transform:translateY(0) scale(1);}
.modal-header{
  padding:18px 22px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.modal-title{font-family:var(--font-head);font-size:0.95rem;font-weight:700;color:var(--text);}
.modal-close{
  background:var(--glass);border:1px solid var(--border2);
  cursor:pointer;color:var(--muted);font-size:0.9rem;
  padding:5px 9px;border-radius:8px;transition:all 0.2s;
}
.modal-close:hover{color:var(--danger);border-color:rgba(244,63,94,0.3);}
.modal-body{padding:22px;}
.modal-footer{
  padding:14px 22px;border-top:1px solid var(--border);
  display:flex;justify-content:flex-end;gap:10px;
}

/* ===== TAB BAR ===== */
.tab-bar{
  display:flex;gap:4px;padding:12px 16px;
  border-bottom:1px solid var(--border);
  overflow-x:auto;flex-shrink:0;
}
.tab-btn{
  padding:7px 16px;border-radius:var(--rs);
  border:1px solid var(--border);
  background:var(--glass);
  font-family:var(--font-body);font-size:0.78rem;font-weight:600;
  cursor:pointer;color:var(--muted);
  transition:all 0.2s;white-space:nowrap;
}
.tab-btn:hover{background:var(--glass2);color:var(--text2);}
.tab-btn.active{
  background:linear-gradient(135deg,rgba(59,130,246,0.2),rgba(6,182,212,0.1));
  border-color:rgba(59,130,246,0.4);color:var(--text);
}

/* Cocopeat tabs */
.cp-tab-wrap{display:flex;gap:6px;margin-bottom:18px;}
.cp-tab{
  padding:8px 20px;border-radius:var(--rs);
  border:1px solid var(--border2);
  background:var(--glass);
  font-family:var(--font-body);font-size:0.82rem;font-weight:600;
  cursor:pointer;color:var(--muted);transition:all 0.2s;
}
.cp-tab.active{
  background:linear-gradient(135deg,rgba(16,185,129,0.2),rgba(6,182,212,0.1));
  border-color:rgba(16,185,129,0.4);color:var(--text);
}
.cp-tab:hover:not(.active){border-color:var(--border3);color:var(--text2);}

/* Amount type */
.amount-type-wrap{display:flex;gap:8px;}
.at-btn{
  flex:1;padding:10px;border-radius:var(--rs);
  border:1px solid var(--border2);
  background:var(--glass);
  font-family:var(--font-body);font-size:0.82rem;font-weight:600;
  cursor:pointer;color:var(--muted);transition:all 0.2s;text-align:center;
}
.at-btn:hover:not(.active){background:var(--glass2);}
.at-btn.active.cash{
  background:linear-gradient(135deg,rgba(16,185,129,0.2),rgba(5,150,105,0.1));
  border-color:rgba(16,185,129,0.4);color:#34d399;
}
.at-btn.active.account{
  background:linear-gradient(135deg,rgba(59,130,246,0.2),rgba(6,182,212,0.1));
  border-color:rgba(59,130,246,0.4);color:#60a5fa;
}
.total-display{
  background:linear-gradient(135deg,rgba(16,185,129,0.12),rgba(6,182,212,0.06));
  border:1px solid rgba(16,185,129,0.2);
  border-radius:var(--rs);padding:11px 14px;
  font-family:var(--font-head);font-size:1rem;font-weight:800;color:var(--success);
  text-align:center;
}

/* Attendance */
.att-tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
.att-tab{
  padding:8px 18px;border-radius:var(--rs);
  border:1px solid var(--border2);
  background:var(--glass);
  font-family:var(--font-body);font-size:0.82rem;font-weight:600;
  cursor:pointer;color:var(--muted);transition:all 0.2s;
}
.att-tab.active{
  background:linear-gradient(135deg,rgba(139,92,246,0.2),rgba(59,130,246,0.1));
  border-color:rgba(139,92,246,0.4);color:var(--text);
}
.att-tab:hover:not(.active){border-color:var(--border3);color:var(--text2);}

.att-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
.att-card{
  background:#0d1b2e;
  border:1px solid rgba(255,255,255,0.08);
  border-radius:var(--r);padding:16px;
  transition:all 0.2s;
}
.att-card:hover{border-color:var(--border2);box-shadow:var(--sm);}
.att-name{font-family:var(--font-head);font-size:0.92rem;font-weight:700;color:var(--text);margin-bottom:3px;}
.att-desig{font-size:0.72rem;color:var(--muted);margin-bottom:12px;}
.hours-input-wrap{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.hours-input{
  width:80px;padding:7px 10px;
  background:var(--glass2);border:1px solid var(--border2);
  border-radius:var(--rs);
  font-family:var(--font-body);font-size:0.9rem;font-weight:700;
  color:var(--text);text-align:center;outline:none;
}
.hours-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow);}
.salary-pill{
  background:var(--sl);color:var(--success);
  padding:4px 12px;border-radius:20px;
  font-size:0.78rem;font-weight:700;
  border:1px solid rgba(16,185,129,0.2);
}
.absent-btn{
  padding:7px 14px;border-radius:var(--rs);
  border:1px solid var(--border2);
  background:var(--glass);
  font-family:var(--font-body);font-size:0.78rem;font-weight:600;
  cursor:pointer;color:var(--muted);transition:all 0.2s;
}
.absent-btn.active{background:var(--dl);border-color:rgba(244,63,94,0.3);color:#fda4af;}
.att-saved{display:inline-flex;align-items:center;gap:4px;font-size:0.72rem;font-weight:700;color:var(--success);margin-top:6px;}
.emp-stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;}

/* Report summary */
.report-summary{
  padding:16px 20px;border-bottom:1px solid var(--border);
  display:flex;gap:20px;flex-wrap:wrap;
}
.rsm .rl{font-size:0.66rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.rsm .rv{font-family:var(--font-head);font-size:1.35rem;font-weight:800;color:var(--text);}

/* ===== MISC ===== */
.empty-state{padding:48px 20px;text-align:center;}
.empty-icon{font-size:2.5rem;margin-bottom:10px;opacity:0.5;}
.empty-title{font-family:var(--font-head);font-size:0.9rem;font-weight:700;color:var(--text2);margin-bottom:4px;}
.empty-sub{font-size:0.78rem;color:var(--muted);}
.spinner{
  width:18px;height:18px;
  border:2px solid var(--border2);
  border-top-color:var(--primary);
  border-radius:50%;
  animation:spin 0.7s linear infinite;
  display:inline-block;vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg);}}

#toast{
  position:fixed;bottom:24px;right:24px;z-index:999;
  padding:12px 20px;border-radius:var(--rs);
  font-size:0.84rem;font-weight:600;
  box-shadow:var(--sl2);
  transform:translateY(80px);opacity:0;
  transition:all 0.35s cubic-bezier(.16,1,.3,1);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid var(--border2);
  background:rgba(13,27,46,0.95);color:var(--text);
}
#toast.show{transform:translateY(0);opacity:1;}
#toast.success{background:rgba(16,57,36,0.95);border-color:rgba(16,185,129,0.3);color:#6ee7b7;}
#toast.error{background:rgba(69,10,10,0.95);border-color:rgba(244,63,94,0.3);color:#fda4af;}

.hidden{display:none!important;}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0;}
.flex{display:flex;}.gap-2{gap:8px;}.ml-auto{margin-left:auto;}.mb-3{margin-bottom:14px;}

/* ===== MOBILE BOTTOM NAV ===== */
.mobile-bottom-nav{
  display:none;position:fixed;bottom:0;left:0;right:0;
  background:#0a1628;
  border-top:1px solid rgba(255,255,255,0.1);z-index:200;
  padding-bottom:max(8px,env(safe-area-inset-bottom));
}
.mbn-inner{display:flex;align-items:stretch;}
.mbn-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:8px 4px 10px;
  border:none;background:transparent;
  font-family:var(--font-body);font-size:0.58rem;font-weight:600;
  color:var(--muted);cursor:pointer;gap:4px;transition:all 0.2s;min-height:56px;
  position:relative;
}
.mbn-btn.active{color:var(--primary);}
.mbn-btn.active::before{
  content:'';position:absolute;top:0;left:20%;right:20%;height:2px;
  background:linear-gradient(90deg,var(--primary),var(--accent));
  border-radius:0 0 4px 4px;
}
.mbn-btn .mbn-icon{font-size:1.3rem;line-height:1;}
.mbn-badge{
  position:absolute;top:4px;right:calc(50% - 18px);
  background:var(--danger);color:#fff;border-radius:50%;
  width:15px;height:15px;font-size:0.55rem;font-weight:800;
  display:flex;align-items:center;justify-content:center;
}

/* ===== HAMBURGER ===== */
.hamburger{
  display:none;flex-direction:column;justify-content:center;
  gap:5px;cursor:pointer;padding:8px;
  border-radius:var(--rs);border:1px solid var(--border);
  background:var(--glass);width:38px;height:38px;
  transition:all 0.2s;
}
.hamburger:hover{background:var(--glass2);}
.hamburger span{display:block;width:18px;height:2px;background:var(--text2);border-radius:2px;transition:all 0.2s;}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);z-index:149;}

/* Page transitions */
.page-enter{animation:pageIn 0.3s cubic-bezier(.16,1,.3,1) both;}
@keyframes pageIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  .sidebar{width:280px!important;transform:translateX(-100%);transition:transform 0.3s cubic-bezier(.4,0,.2,1);z-index:300!important;}
  .sidebar.open{transform:translateX(0)!important;}
  .main{margin-left:0!important;width:100%;min-width:0;height:100vh;overflow-y:auto;}
  .topbar{padding:0 14px;height:54px;}
  .topbar-title{font-size:0.9rem;}
  .hamburger{display:flex!important;}
  .mobile-bottom-nav.visible{display:block;}
  .content{padding:14px 12px 80px!important;}
  .form-grid{grid-template-columns:1fr!important;}
  .field[style*="grid-column:span 2"]{grid-column:span 1!important;}
  .stats-grid{grid-template-columns:1fr 1fr!important;gap:10px;}
  .emp-stat-grid{grid-template-columns:1fr 1fr!important;}
  .att-grid{grid-template-columns:1fr!important;}
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  table{min-width:480px;}
  .table-toolbar{flex-wrap:wrap;}
  .search-bar{width:100%;}
  .ml-auto{margin-left:0!important;width:100%;display:flex;gap:8px;}
  .ml-auto .btn{flex:1;}
  .card-header{flex-wrap:wrap;gap:8px;}
  .card-body{padding:14px 12px;}
  .cp-tab-wrap,.att-tabs{flex-wrap:wrap;}
  .pagination{flex-wrap:wrap;gap:6px;}
  .modal{width:calc(100vw - 20px)!important;max-height:88vh;overflow-y:auto;border-radius:20px 20px 0 0;position:fixed;bottom:0;left:0;right:0;max-width:100%!important;}
  .modal-overlay{align-items:flex-end;padding:0;}
  .modal-overlay.open .modal{transform:translateY(0)!important;}
  .veh-panel{display:none!important;}
  .module-switcher{padding:8px;}
  .mod-btn{font-size:0.74rem;padding:8px 10px;}
  #companyCardsGrid{grid-template-columns:1fr!important;}
}
@media(max-width:420px){
  .stats-grid{grid-template-columns:1fr 1fr!important;}
  .topbar-title{font-size:0.82rem;}
}
@media(min-width:769px){
  .hamburger{display:none!important;}
  .mobile-bottom-nav{display:none!important;}
}
@media print{
  .sidebar,.mobile-bottom-nav,.hamburger,#sidebarOverlay,#installBanner{display:none!important;}
  .main{margin-left:0!important;}
  .content{padding:0!important;}
  body{background:#fff!important;color:#000!important;}
}

async function api(method,table,body,filter=''){
  const url=`${SB_URL}/rest/v1/${table}${filter?'?'+filter:''}`;
  const headers={'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`};
  if(['POST','PATCH','PUT'].includes(method)){
    headers['Content-Type']='application/json';
    headers['Prefer']='return=representation';
  }
  const res=await fetch(url,{method,headers,body:body?JSON.stringify(body):undefined});
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.message||'API Error');}
  return method==='DELETE'?null:res.json();
}

// AUTH
function doLogin(){
  var username=document.getElementById('loginUser').value.trim();
  var password=document.getElementById('loginPass').value;
  var btn=document.getElementById('loginBtn');
  var err=document.getElementById('loginErr');
  if(!username||!password){
    err.textContent='Please enter username and password';
    err.style.display='block';
    return;
  }
  btn.disabled=true;
  btn.textContent='Signing in...';
  err.style.display='none';

  var xhr=new XMLHttpRequest();
  var url=SB_URL+'/rest/v1/users?username=eq.'+encodeURIComponent(username)+'&password=eq.'+encodeURIComponent(password)+'&is_active=eq.true&select=*';
  xhr.open('GET',url,true);
  xhr.setRequestHeader('apikey',SB_KEY);
  xhr.setRequestHeader('Authorization','Bearer '+SB_KEY);
  xhr.onreadystatechange=function(){
    if(xhr.readyState!==4) return;
    btn.disabled=false;
    btn.textContent='Sign In';
    if(xhr.status===200){
      var users=JSON.parse(xhr.responseText);
      if(!users||!users.length){
        err.textContent='Invalid username or password';
        err.style.display='block';
        return;
      }
      currentUser=users[0];
      try{sessionStorage.setItem('huskerUser',JSON.stringify(currentUser));}catch(e){}
      // Load companies then decide flow
      loadCompaniesAndProceed();
    } else {
      err.textContent='Server error: '+xhr.status+' — '+xhr.statusText;
      err.style.display='block';
    }
  };
  xhr.onerror=function(){
    btn.disabled=false;
    btn.textContent='Sign In';
    err.textContent='Network error — Cannot reach server. Check internet connection.';
    err.style.display='block';
  };
  xhr.send();
}

// FETCH ALL
async function fetchAll(){
  try{
    const cf = coFilter();
    const entryFilter = cf ? cf+'&order=date.desc,created_at.desc&select=*' : 'order=date.desc,created_at.desc&select=*';
    const vehFilter = cf ? cf+'&order=vehicle_number.asc&select=*' : 'order=vehicle_number.asc&select=*';
    // cf example: 'or=(company_id.eq.2,company_id.is.null)' or 'company_id=eq.1'
    // Both work fine when appended with & before other params
    [allEntries,allVehicles]=await Promise.all([
      api('GET','husk_entries',null,entryFilter),
      api('GET','vehicles',null,vehFilter)
    ]);
    if(currentUser.role==='admin') allUsers=await api('GET','users',null,'order=created_at.asc&select=*');
    filteredEntries=[...allEntries];
    renderDashboard();renderSideVehicles();renderVehicleSelect();renderFilters();renderTable();
    if(currentUser.role==='admin'){renderVehicleTable();renderUserTable();}
  }catch(e){toast('Error loading data: '+e.message,'error');}
}

    el.classList.toggle('active',el.textContent.trim().toLowerCase().includes(page==='dashboard'?'dashboard':page==='add'?'add':page==='entries'?'all':page==='reports'?'monthly':page==='vehicles'?'vehicle':page==='users'?'user':'__'));

// FILTERS
async function renderFilters(){
  const me=allEntries.filter(e=>e.entry_type===currentModule);
  const months=[...new Set(me.map(e=>e.date?.slice(0,7)).filter(Boolean))].sort().reverse();
  const names=[...new Set(me.map(e=>e.name).filter(Boolean))].sort();
  const ms=document.getElementById('filterMonth'),ns=document.getElementById('filterName');
  const mv=ms.value,nv=ns.value;
  ms.innerHTML='<option value="">All Months</option>'+months.map(m=>{const[y,mo]=m.split('-');return`<option value="${m}" ${mv===m?'selected':''}>${new Date(y,mo-1).toLocaleString('default',{month:'long',year:'numeric'})}</option>`;}).join('');
  ns.innerHTML='<option value="">All Drivers</option>'+names.map(n=>`<option value="${n}" ${nv===n?'selected':''}>${n}</option>`).join('');
}

function applyFilters(){
  const s=document.getElementById('searchInput')?.value.toLowerCase()||'';
  const m=document.getElementById('filterMonth')?.value||'';
  const n=document.getElementById('filterName')?.value||'';
  filteredEntries=allEntries.filter(e=>{
    if(e.entry_type!==currentModule)return false;
    if(m&&!e.date?.startsWith(m))return false;
    if(n&&e.name!==n)return false;
    if(s&&!e.name?.toLowerCase().includes(s)&&!e.vehicle_number?.toLowerCase().includes(s))return false;
    return true;
  });
  currentPage=1;renderTable();
}

async function renderTable(){
  const start=(currentPage-1)*PER_PAGE;
  const page=filteredEntries.slice(start,start+PER_PAGE);
  const isAdmin=currentUser?.role==='admin';
  const tbody=document.getElementById('tableBody');
  tbody.innerHTML=page.length?page.map((e,i)=>`<tr>
    <td class="sno">${start+i+1}</td>
    <td>${fd(e.date)}</td>
    <td class="name-cell">${e.name}</td>
    <td class="time-cell">${e.time}</td>
    <td><span class="vbadge">${e.vehicle_number}</span></td>
    <td><span class="cft-badge">${e.cft_value||'—'}</span></td>
    <td style="color:var(--muted);font-size:0.82rem">${e.owner_name||'—'}</td>
    <td class="no-print"><div class="flex gap-2">
      <button class="btn btn-ghost btn-sm" onclick="openEdit(${e.id})" title="Edit">✏️</button>
      ${isAdmin?`<button class="btn btn-ghost btn-sm" onclick="deleteEntry(${e.id})" title="Delete">🗑️</button>`:''}
    </div></td>
  </tr>`).join(''):`<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">No entries found</div></div></td></tr>`;
  const total=filteredEntries.length,tp=Math.ceil(total/PER_PAGE);
  const s2=Math.min(start+1,total),e2=Math.min(currentPage*PER_PAGE,total);
  document.getElementById('pageInfo').textContent=total?`Showing ${s2}–${e2} of ${total}`:'0 entries';
  const pb=document.getElementById('pageBtns');
  if(tp<=1){pb.innerHTML='';return;}
  let h=`<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  for(let p=1;p<=tp;p++){if(p===1||p===tp||Math.abs(p-currentPage)<=1)h+=`<button class="page-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;else if(Math.abs(p-currentPage)===2)h+=`<span class="page-btn" style="border:none;cursor:default">…</span>`;}
  h+=`<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===tp?'disabled':''}>›</button>`;
  pb.innerHTML=h;
}
async function goPage(p){currentPage=p;renderTable();}

      <thead><tr><th>Employee</th><th>Days</th><th>Total Hrs</th><th>Salary</th></tr></thead>

        <td>${e.days}</td>
        <td><span class="cft-badge">${e.totalHrs.toFixed(1)} hrs</span></td>
        <td style="font-weight:700;color:#7c3aed">${fmt(e.totalSalary)}</td>
      </tr>`).join('')}</tbody>
    </table></div>`:''}
    <div style="padding:14px 20px 8px;font-size:0.85rem;font-weight:700;border-top:1px solid var(--border)">Daily Entries</div>
    <div class="table-wrap"><table>
      <thead><tr><th>#</th><th>Date</th><th>Employee</th><th>Hours</th>${showSalary?'<th>Salary</th>':''}<th>Note</th><th>Status</th></tr></thead>
      <tbody>${data.sort((a,b)=>a.date.localeCompare(b.date)).map((a,i)=>`<tr>
        <td class="sno">${i+1}</td>
        <td>${fd(a.date)}</td>
        <td class="name-cell">${a.employee_name}</td>
        <td><span class="cft-badge">${parseFloat(a.hours_worked).toFixed(1)} hrs</span></td>

let allMachineExpenses=[], allMachines=[], machExpPage=1;
const ME_PAGE_SIZE=15;

async function fetchMachExpData(){
  try{
    const _mcf=coFilter();
    const [exp, mach] = await Promise.all([
      api('GET','machine_expenses',null,(_mcf?_mcf+'&':'')+'order=date.desc,created_at.desc&select=*'),
      api('GET','machines',null,(_mcf?_mcf+'&':'')+'order=name.asc&select=*')
    ]);
    allMachineExpenses = exp||[];
    allMachines = mach||[];
  } catch(e){ allMachineExpenses=[]; allMachines=[]; }
}

async function switchMachExpTab(idx){
  [0,1,2,3].forEach(i=>{
    document.getElementById('mach-tab-'+i)?.classList.toggle('hidden', i!==idx);
  });
  const navMap={0:'machExpNavAdd',1:'machExpNavAll',2:'machExpNavReport',3:'machExpNavMachines'};
  Object.values(navMap).forEach(id=>document.getElementById(id)?.classList.remove('active'));
  document.getElementById(navMap[idx])?.classList.add('active');
  const titles=['Add Machine Expense','All Machine Expenses','Machine Expense Report','Manage Machines'];
  document.getElementById('pageTitle').textContent = titles[idx]||'Machine Expenses';
  if(idx===1){ populateMachExpFilters(); filterMachExp(); }
  if(idx===2){ populateMachExpReportMonths(); }
  if(idx===3){ renderMachinesTable(); }
}

function populateMachExpFilters(){
  // Month filter
  const months=[...new Set(allMachineExpenses.map(e=>e.date?.slice(0,7)).filter(Boolean))].sort().reverse();
  const msel=document.getElementById('me-filter-month');
  const cur=msel?.value;
  if(msel) msel.innerHTML='<option value="">All Months</option>'+months.map(m=>{
    const[y,mo]=m.split('-');
    return`<option value="${m}" ${cur===m?'selected':''}>${new Date(y,mo-1).toLocaleString('default',{month:'long',year:'numeric'})}</option>`;
  }).join('');
  // Machine filter
  const machSel=document.getElementById('me-filter-machine');
  const cur2=machSel?.value;
  if(machSel) machSel.innerHTML='<option value="">All Machines</option>'+allMachines.map(m=>`<option value="${m.id}" ${cur2===String(m.id)?'selected':''}>${m.name}</option>`).join('');
  // Machine dropdown in form
  const formSel=document.getElementById('me-machine');
  if(formSel) formSel.innerHTML='<option value="">Select Machine</option>'+allMachines.filter(m=>m.is_active!==false).map(m=>`<option value="${m.id}">${m.name}${m.type?' ('+m.type+')':''}</option>`).join('');
}

function filterMachExp(){
  const q=(document.getElementById('me-search')?.value||'').toLowerCase();
  const month=document.getElementById('me-filter-month')?.value||'';
  const machId=document.getElementById('me-filter-machine')?.value||'';
  let data=allMachineExpenses.filter(e=>{
    if(month && !e.date?.startsWith(month)) return false;
    if(machId && String(e.machine_id)!==machId) return false;
    if(q){
      const mach=allMachines.find(m=>m.id===e.machine_id);
      const s=`${e.date}${mach?.name||''}${e.part_name||''}${e.worker_name||''}${e.time_acquired||''}`.toLowerCase();
      if(!s.includes(q)) return false;
    }
    return true;
  });
  machExpPage=1;
  renderMachExpTable(data);
}

function renderMachExpTable(data){
  if(!data) data=allMachineExpenses;
  const tbody=document.getElementById('machExpTbody');
  if(!tbody) return;
  const total=data.length;
  const pages=Math.ceil(total/ME_PAGE_SIZE)||1;
  if(machExpPage>pages) machExpPage=1;
  const slice=data.slice((machExpPage-1)*ME_PAGE_SIZE, machExpPage*ME_PAGE_SIZE);
  const isAdmin=currentUser?.role==='admin';
  const catLabel={fuel:'⛽ Fuel',repair:'🔧 Repair',parts:'🔩 Parts',service:'🛠 Service',other:'📦 Other'};
  tbody.innerHTML = slice.length ? slice.map((e,i)=>{

      <td class="no-print">${isAdmin?`<button class="btn btn-danger btn-sm" onclick="deleteMachExp(${e.id})">🗑</button>`:'—'}</td>
    </tr>`;
  }).join('') : `<tr><td colspan="8" style="text-align:center;padding:30px;color:var(--muted)">No expenses found</td></tr>`;
  // Pagination
  const pg=document.getElementById('machExpPagination');
  if(pg){
    pg.innerHTML='';
    if(pages>1){
      const mkBtn=(label,page,disabled,active)=>{
        const b=document.createElement('button');
        b.className='pg-btn'+(active?' active':'');
        b.textContent=label; b.disabled=disabled||active;
        b.onclick=()=>{ machExpPage=page; filterMachExp(); };
        pg.appendChild(b);
      };
      mkBtn('«',1,machExpPage===1); mkBtn('‹',machExpPage-1,machExpPage===1);
      for(let p=Math.max(1,machExpPage-2);p<=Math.min(pages,machExpPage+2);p++) mkBtn(p,p,false,p===machExpPage);
      mkBtn('›',machExpPage+1,machExpPage===pages); mkBtn('»',pages,machExpPage===pages);
    }
  }
}

async function saveMachExp(){

function loadMachExpReport(){
  const month=document.getElementById('me-report-month')?.value;
  const el=document.getElementById('machExpReportContent');
  if(!month){ el.innerHTML=`<div class="empty-state"><div class="empty-icon">📅</div><div class="empty-title">Select a month</div></div>`; return; }
  const data=allMachineExpenses.filter(e=>e.date?.startsWith(month));
  if(!data.length){ el.innerHTML=`<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">No data for this month</div></div>`; return; }
  const fmt=n=>'₹'+parseFloat(n||0).toLocaleString('en-IN',{minimumFractionDigits:2});

  const totalExp=data.reduce((s,e)=>s+parseFloat(e.expense_amount||0),0);
  const totalWork=data.reduce((s,e)=>s+parseFloat(e.worker_amount||0),0);
  const grandTotal=totalExp+totalWork;

  // Per machine summary
  const machMap={};
  data.forEach(e=>{
    const mach=allMachines.find(m=>m.id===e.machine_id);
    const key=mach?.name||'Unknown';
    if(!machMap[key]) machMap[key]={entries:0,expAmt:0,workAmt:0};
    machMap[key].entries++;
    machMap[key].expAmt+=parseFloat(e.expense_amount||0);
    machMap[key].workAmt+=parseFloat(e.worker_amount||0);
  });

  el.innerHTML=`
    <div class="report-summary">
      <div class="rsm"><div class="rl">Total Entries</div><div class="rv" style="color:var(--primary)">${data.length}</div></div>
      <div class="rsm"><div class="rl">Expense Amount</div><div class="rv" style="color:var(--danger)">${fmt(totalExp)}</div></div>
      <div class="rsm"><div class="rl">Worker Amount</div><div class="rv" style="color:var(--warning)">${fmt(totalWork)}</div></div>
      <div class="rsm"><div class="rl">Grand Total</div><div class="rv" style="color:#7c3aed">${fmt(grandTotal)}</div></div>
    </div>
    <div style="padding:14px 20px 8px;font-size:0.85rem;font-weight:700;border-top:1px solid var(--border)">Machine Summary</div>
    <div class="table-wrap"><table>
      <thead><tr><th>Machine</th><th>Entries</th><th>Expense Amt</th><th>Worker Amt</th><th>Total</th></tr></thead>
      <tbody>${Object.entries(machMap).map(([name,d])=>`<tr>
        <td class="name-cell">${name}</td>
        <td>${d.entries}</td>
        <td style="color:var(--danger);font-weight:700">${fmt(d.expAmt)}</td>
        <td style="color:var(--warning);font-weight:700">${fmt(d.workAmt)}</td>
        <td style="color:#7c3aed;font-weight:800">${fmt(d.expAmt+d.workAmt)}</td>
      </tr>`).join('')}</tbody>
    </table></div>
    <div style="padding:14px 20px 8px;font-size:0.85rem;font-weight:700;border-top:1px solid var(--border)">Detailed Entries</div>
    <div class="table-wrap"><table>
      <thead><tr><th>#</th><th>Date</th><th>Machine</th><th>Part Name</th><th>Expense (₹)</th><th>Worker</th><th>Worker Amt (₹)</th><th>Time</th></tr></thead>
      <tbody>${data.sort((a,b)=>a.date.localeCompare(b.date)).map((e,i)=>{
        const mach=allMachines.find(m=>m.id===e.machine_id);
        return`<tr>
          <td class="sno">${i+1}</td>
          <td>${fd(e.date)}</td>
          <td class="name-cell">${mach?.name||'—'}</td>
          <td>${e.part_name||'—'}</td>
          <td style="font-weight:700;color:var(--danger)">${fmt(e.expense_amount)}</td>
          <td>${e.worker_name||'—'}</td>
          <td style="font-weight:700;color:var(--warning)">${fmt(e.worker_amount)}</td>
          <td style="color:var(--muted);font-size:0.82rem">${e.time_acquired||'—'}</td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>
  `;
}

// Filter
async function filterVehExp(){
  const s=document.getElementById('veSearch').value.toLowerCase();
  const m=document.getElementById('veFilterMonth').value;
  const cat=document.getElementById('veFilterCat').value;
  const veh=document.getElementById('veFilterVeh').value;
  vehExpFiltered=allVehExp.filter(e=>{
    if(m&&!e.date?.startsWith(m))return false;
    if(cat&&e.category!==cat)return false;
    if(veh&&e.vehicle_number!==veh)return false;
    if(s&&!e.vehicle_number?.toLowerCase().includes(s)&&!e.description?.toLowerCase().includes(s))return false;
    return true;
  });
  vehExpPage=1;renderVehExpTable();
}

async function renderAttCards(){
  initAttDate();
  const date=document.getElementById('attDate')?.value;
  const grid=document.getElementById('attCardsGrid');
  const isAdminUser=currentUser?.role==='admin';
  // Update button label

    return;
  }
  const existing={};
  allAttendance.filter(a=>a.date===date&&a.status==='approved').forEach(a=>existing[a.employee_id]=a);

  grid.innerHTML=allEmployees.map(emp=>{
    const att=existing[emp.id];
    const hrs=att?att.hours_worked:0;
    const hrRate=getHourlyRate(emp);
    const salary=(hrs*hrRate).toFixed(2);
    return `<div class="att-card" id="attcard-${emp.id}" data-rate="${hrRate}">
      <div class="att-name">${emp.name}</div>
      <div class="att-desig">${emp.designation||'Employee'} ${emp.phone?'· '+emp.phone:''} ${canViewSalary()?`<span style="color:var(--success);font-weight:700">₹${emp.daily_wage||DEFAULT_DAILY_WAGE}/day</span>`:''}</div>
      <div class="hours-input-wrap">
        <input type="number" class="hours-input" id="att-hrs-${emp.id}" value="${hrs}" min="0" max="16" step="0.5" oninput="updateSalaryPill(${emp.id},${hrRate})" placeholder="hrs"/>
        <span style="font-size:0.8rem;color:var(--muted)">hrs</span>
        ${canViewSalary()?`<span class="salary-pill" id="att-sal-${emp.id}">₹${(hrs*hrRate).toLocaleString('en-IN',{minimumFractionDigits:2})}</span>`:`<span id="att-sal-${emp.id}" style="display:none"></span>`}
      </div>
      <div class="flex gap-2 items-center">
        <button class="absent-btn ${(!att||hrs>0)?'':'active'}" id="att-absent-${emp.id}" onclick="toggleAbsent(${emp.id})">Absent</button>
        <input type="text" style="flex:1;padding:6px 10px;border:1.5px solid var(--border2);border-radius:var(--rs);font-family:'Plus Jakarta Sans',sans-serif;font-size:0.78rem;outline:none;" id="att-note-${emp.id}" placeholder="Note (optional)" value="${att?.note||''}"/>
      </div>
      ${att&&att.status==='approved'?`<div class="att-saved">✓ Approved</div>`:att&&att.status==='pending'?`<div style="font-size:0.72rem;font-weight:700;color:var(--warning);margin-top:6px;">⏳ Pending Approval</div>`:''}
    </div>`;
  }).join('');
}

async function updateSalaryPill(empId, rate){
  const hrs=parseFloat(document.getElementById('att-hrs-'+empId).value)||0;
  const r=rate||parseFloat(document.getElementById('attcard-'+empId)?.dataset?.rate)||65;
  document.getElementById('att-sal-'+empId).textContent='₹'+(hrs*r).toLocaleString('en-IN',{minimumFractionDigits:2});
  if(hrs>0){document.getElementById('att-absent-'+empId).classList.remove('active');}
}

async function toggleAbsent(empId){
  const btn=document.getElementById('att-absent-'+empId);
  const hrsInput=document.getElementById('att-hrs-'+empId);
  const isAbsent=btn.classList.contains('active');
  if(isAbsent){btn.classList.remove('active');hrsInput.value=0;updateSalaryPill(empId);}
  else{btn.classList.add('active');hrsInput.value=0;updateSalaryPill(empId);}
}

async function saveAllAttendance(){
  const date=document.getElementById('attDate').value;
  if(!date){toast('Select a date first','error');return;}
  const isAdmin=currentUser?.role==='admin';
  const status=isAdmin?'approved':'pending';
  const btn=document.getElementById('saveAttText');
  btn.innerHTML='<span class="spinner"></span> Saving...';
  let saved=0,errors=0;
  const pendingEntries=[];
  for(const emp of allEmployees){
    const hrsEl=document.getElementById('att-hrs-'+emp.id);
    const noteEl=document.getElementById('att-note-'+emp.id);
    const absentBtn=document.getElementById('att-absent-'+emp.id);
    if(!hrsEl)continue;
    const hours_worked=parseFloat(hrsEl.value)||0;
    const note=noteEl?.value||'';
    const isAbsent=absentBtn?.classList.contains('active')||false;
    if(!isAbsent&&hours_worked===0)continue;
    try{
      const existing=allAttendance.find(a=>a.employee_id===emp.id&&a.date===date);
      if(existing){
        await api('PATCH','attendance',{hours_worked,note,employee_name:emp.name,status,submitted_by:currentUser.username},`id=eq.${existing.id}`);
      } else {
        await api('POST','attendance',withCompany({employee_id:emp.id,employee_name:emp.name,date,hours_worked,note,status,submitted_by:currentUser.username}));
      }
      if(!isAdmin)pendingEntries.push(emp.name);
      saved++;
    }catch(e){errors++;}
  }
  // Create notification for admin if supervisor submitted
  if(!isAdmin&&pendingEntries.length>0){
    try{
      await api('POST','notifications',{
        type:'attendance_pending',
        message:`${currentUser.full_name||currentUser.username} submitted attendance for ${date} (${pendingEntries.length} employees)`,
        data:JSON.stringify({date,submitted_by:currentUser.username,employees:pendingEntries}),
        is_read:false
      });
    }catch(e){}
  }
  await fetchAttData();
  if(!isAdmin)await fetchNotifications();
  btn.textContent=isAdmin?'💾 Save All':'📤 Submit for Approval';
  toast(isAdmin?`Saved ${saved} records`:`Submitted ${saved} entries for admin approval`,errors?'error':'success');
}

  else if(empId)attData=attData.filter(a=>String(a.employee_id)===empId);
  let advData=allAdvances.filter(a=>a.date?.startsWith(month));
  if(empId)advData=advData.filter(a=>String(a.employee_id)===empId);
  const wb=XLSX.utils.book_new();
  if(attData.length){
    const rows=attData.map((a,i)=>{
      const r={'S.No':i+1,'Date':fd(a.date),'Employee':a.employee_name,'Hours Worked':a.hours_worked,'Note':a.note||''};
      if(canViewSalary())r['Salary Earned']=a.salary_earned;
      return r;
    });
    const ws=XLSX.utils.json_to_sheet(rows);
    ws['!cols']=[6,13,20,12,14,20].map(w=>({wch:w}));
    XLSX.utils.book_append_sheet(wb,ws,'Attendance');
  }
  if(advData.length){
    const ws=XLSX.utils.json_to_sheet(advData.map((a,i)=>({'S.No':i+1,'Date':fd(a.date),'Employee':a.employee_name,'Advance Amount':a.amount,'Note':a.note||''})));
    ws['!cols']=[6,13,20,14,20].map(w=>({wch:w}));
    XLSX.utils.book_append_sheet(wb,ws,'Advances');
  }
  XLSX.writeFile(wb,`attendance_${month}.xlsx`);toast('Exported!','success');
}

// PENDING APPROVALS
async function renderPendingApprovals(){
  const pending=allAttendance.filter(a=>a.status==='pending');
  const el=document.getElementById('pendingAttContent');if(!el)return;
  if(!pending.length){
    el.innerHTML=`<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-title">No pending approvals</div><div class="empty-sub">All attendance entries are approved</div></div>`;
    return;
  }
  // Group by date + submitted_by
  const groups={};
  pending.forEach(a=>{
    const key=`${a.date}__${a.submitted_by||'unknown'}`;
    if(!groups[key])groups[key]={date:a.date,submitted_by:a.submitted_by,entries:[]};
    groups[key].entries.push(a);
  });
  el.innerHTML=Object.entries(groups).map(([key,g])=>`
    <div style="border-bottom:1px solid var(--border);padding:16px 20px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
        <div>
          <div style="font-weight:700;font-size:0.92rem;">📅 ${fd(g.date)}</div>
          <div style="font-size:0.75rem;color:var(--muted);margin-top:2px;">Submitted by: <b>${g.submitted_by||'unknown'}</b> · ${g.entries.length} employees</div>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-success btn-sm" onclick="approveGroup('${g.date}','${g.submitted_by}')">✅ Approve</button>
          <button class="btn btn-sm" style="background:var(--dl);color:var(--danger);border:1px solid #fecaca;" onclick="rejectGroup('${g.date}','${g.submitted_by}')">✕ Reject</button>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Employee</th><th>Hours</th><th>Salary</th><th>Note</th></tr></thead>
          <tbody>${g.entries.map(a=>{
            const emp=allEmployees.find(e=>e.id===a.employee_id);
            const hrRate=emp?getHourlyRate(emp):65;
            const sal=(parseFloat(a.hours_worked||0)*hrRate).toFixed(2);
            return`<tr>
              <td class="name-cell">${a.employee_name}</td>
              <td>${a.hours_worked} hrs</td>
              <td style="color:var(--success);font-weight:700">₹${parseFloat(sal).toLocaleString('en-IN',{minimumFractionDigits:2})}</td>
              <td style="color:var(--muted);font-size:0.82rem">${a.note||'—'}</td>
            </tr>`;
          }).join('')}</tbody>
        </table>
      </div>
    </div>
  `).join('');
}

async function approveGroup(date, submitted_by){
  const pending=allAttendance.filter(a=>a.status==='pending'&&a.date===date&&a.submitted_by===submitted_by);
  let done=0;
  for(const a of pending){
    try{
      await api('PATCH','attendance',{status:'approved',approved_by:currentUser.username,approved_at:new Date().toISOString()},`id=eq.${a.id}`);
      done++;
    }catch(e){}
  }
  // Mark notifications as read
  try{await api('PATCH','notifications',{is_read:true},`type=eq.attendance_pending&is_read=eq.false`);}catch(e){}
  toast(`Approved ${done} entries!`,'success');
  await fetchAttData();await fetchNotifications();renderPendingApprovals();
}

async function rejectGroup(date, submitted_by){
  if(!confirm('Reject these entries? They will be deleted.'))return;
  const pending=allAttendance.filter(a=>a.status==='pending'&&a.date===date&&a.submitted_by===submitted_by);
  for(const a of pending){
    try{await api('DELETE','attendance',null,`id=eq.${a.id}`);}catch(e){}
  }
  toast('Entries rejected and removed','success');
  await fetchAttData();await fetchNotifications();renderPendingApprovals();
}

async function approveAll(){
  const pending=allAttendance.filter(a=>a.status==='pending');
  if(!pending.length){toast('No pending entries','error');return;}
  for(const a of pending){
    try{await api('PATCH','attendance',{status:'approved',approved_by:currentUser.username,approved_at:new Date().toISOString()},`id=eq.${a.id}`);}catch(e){}
  }
  try{await api('PATCH','notifications',{is_read:true},`type=eq.attendance_pending&is_read=eq.false`);}catch(e){}
  toast(`All ${pending.length} entries approved!`,'success');
  await fetchAttData();await fetchNotifications();renderPendingApprovals();
}

async function renderCpPagination(prefix,total,page,cb){
  const tp=Math.ceil(total/CP_PER);
  const s=Math.min((page-1)*CP_PER+1,total),e=Math.min(page*CP_PER,total);
  document.getElementById(prefix+'PageInfo').textContent=total?`Showing ${s}–${e} of ${total}`:'0 entries';
  const pb=document.getElementById(prefix+'PageBtns');
  if(tp<=1){pb.innerHTML='';return;}
  let h=`<button class="page-btn" onclick="(${cb.toString()})(${page-1})" ${page===1?'disabled':''}>‹</button>`;
  for(let p=1;p<=tp;p++){if(p===1||p===tp||Math.abs(p-page)<=1)h+=`<button class="page-btn ${p===page?'active':''}" onclick="(${cb.toString()})(${p})">${p}</button>`;else if(Math.abs(p-page)===2)h+=`<span class="page-btn" style="border:none;cursor:default">…</span>`;}
  h+=`<button class="page-btn" onclick="(${cb.toString()})(${page+1})" ${page===tp?'disabled':''}>›</button>`;
  pb.innerHTML=h;
}

// ===== SWIPE GESTURE SUPPORT =====
(function(){
  let startX=0,startY=0,startT=0;
  document.addEventListener('touchstart',function(e){
    startX=e.touches[0].clientX;
    startY=e.touches[0].clientY;
    startT=Date.now();
  },{passive:true});
  document.addEventListener('touchend',function(e){
    if(Date.now()-startT>400) return;
    const dx=e.changedTouches[0].clientX-startX;
    const dy=e.changedTouches[0].clientY-startY;
    if(Math.abs(dx)<60||Math.abs(dy)>Math.abs(dx)*0.8) return;
    // Swipe right → open sidebar
    if(dx>80 && startX<40){
      const sb=document.getElementById('sidebar');
      if(sb&&!sb.classList.contains('open')) toggleSidebar();
    }
    // Swipe left → close sidebar
    if(dx<-80){
      const sb=document.getElementById('sidebar');
      if(sb&&sb.classList.contains('open')) closeSidebar();
    }
  },{passive:true});
})();

async function loadCompaniesAndProceed(){
  try{
    allCompanies = await api('GET','companies',null,'is_active=eq.true&order=id.asc');
    const isAdmin = currentUser?.role === 'admin';

    if(isAdmin){
      // Admin sees company selection screen
      showCompanySelection();
    } else {
      // Normal user - auto select their assigned company
      const userCompany = allCompanies.find(c => c.id === currentUser.company_id);
      if(userCompany){
        selectCompany(userCompany);
      } else if(allCompanies.length === 1){
        selectCompany(allCompanies[0]);
      } else {
        // No company assigned - show selection anyway
        showCompanySelection();
      }
    }
  } catch(e){
    console.error('Company load error:',e);
    // Fallback - proceed without company filter
    currentCompany = {id:null, name:'CocoFarmX', icon:'🌾'};
    startApp();
  }
}

function showCompanySelection(){
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('appPage').classList.add('hidden');
  document.getElementById('companyPage').classList.remove('hidden');

  // Welcome message
  const name = currentUser.full_name || currentUser.username;
  document.getElementById('companyWelcome').textContent = 'Welcome, ' + name + '! Select your company';

  // Render company cards
  const grid = document.getElementById('companyCardsGrid');
  grid.innerHTML = allCompanies.map(c => `
    <div class="company-card" onclick="selectCompany(${JSON.stringify(c).replace(/"/g,'&quot;')})">
      <div class="cc-icon">${c.icon || '🏢'}</div>
      <div class="cc-name">${c.name}</div>
      <button class="cc-btn">Enter →</button>
    </div>
  `).join('');
}

function selectCompany(company){
  currentCompany = company;
  try{
    sessionStorage.setItem('huskerCompany', JSON.stringify(company));
  } catch(e){}
  startApp();
}

// Switch company (from topbar)
function switchCompany(){
  sessionStorage.removeItem('huskerCompany');
  currentCompany = null;
  document.getElementById('appPage').classList.add('hidden');
  showCompanySelection();
}

// Get company filter string for API calls
function coFilter(){
  if(!currentCompany || !currentCompany.id) return '';
  // Also include NULL records (existing data before multi-company) for CocoFarmX
  if(currentCompany.name==='CocoFarmX'){
    return 'or=(company_id.eq.'+currentCompany.id+',company_id.is.null)';
  }
  return 'company_id=eq.'+currentCompany.id;
}

// Helper: merge company_id into body
function withCompany(body){
  if(!currentCompany || !currentCompany.id) return body;
  return Object.assign({}, body, {company_id: currentCompany.id});
}
