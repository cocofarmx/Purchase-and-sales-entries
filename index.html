// ELECTRICITY MODULE
// ============================================================
let allElecBills = [];
let allMeters = [];
let elecPage = 1;
const ELEC_PAGE_SIZE = 20;

function switchElecTab(n) {
  [0,1,2,3].forEach(i => {
    const t = document.getElementById('elec-tab-'+i);
    if(t) t.classList.toggle('hidden', i !== n);
  });
  const btns = document.querySelectorAll('#elecTabBar .tab-btn');
  btns.forEach((b,i) => b.classList.toggle('active', i === n));
  const navIds = ['elecNavAdd','elecNavAll','elecNavReport','elecNavMeters'];
  navIds.forEach((id,i) => { const el=document.getElementById(id); if(el) el.classList.toggle('active', i===n); });
  if(n===1) renderElecBillsTable(allElecBills);
  if(n===2) loadElecReport();
  if(n===3) renderMetersTable();
}

async function fetchElecData() {
  try {
    [allElecBills, allMeters] = await Promise.all([
      api('GET','electricity_bills',null,(coFilter()?coFilter()+'&':'')+'order=date.desc,created_at.desc&select=*'),
      api('GET','meters',null,(coFilter()?coFilter()+'&':'')+'order=meter_name.asc&select=*')
    ]);
    populateElecMetersDropdowns();
    populateElecFilters();
    renderElecBillsTable(allElecBills);
  } catch(e) { toast('Error loading electricity data: '+e.message,'error'); }
}

function populateElecMetersDropdowns() {
  const selects = ['eb-meter','eb-filter-meter','eb-report-meter'];
  selects.forEach(id => {
    const sel = document.getElementById(id);
    if(!sel) return;
    const val = sel.value;
    const isFilter = id.includes('filter') || id.includes('report');
    sel.innerHTML = isFilter ? '<option value="">All Meters</option>' : '<option value="">Select Meter</option>';
    allMeters.filter(m=>m.is_active).forEach(m => {
      sel.innerHTML += `<option value="${m.id}">${m.meter_name}${m.meter_number?' ('+m.meter_number+')':''}</option>`;
    });
    if(val) sel.value = val;
  });
}

function populateElecFilters() {
  const months = [...new Set(allElecBills.map(b=>b.date?.substring(0,7)))].sort().reverse();
  ['eb-filter-month','eb-report-month'].forEach(id => {
    const sel = document.getElementById(id);
    if(!sel || id==='eb-report-month') return;
    const val = sel.value;
    sel.innerHTML = '<option value="">All Months</option>';
    months.forEach(m => sel.innerHTML += `<option value="${m}">${m}</option>`);
    if(val) sel.value = val;
  });
}

function calcEbUnits() {
  const prev = parseFloat(document.getElementById('eb-prev-reading').value)||0;
  const curr = parseFloat(document.getElementById('eb-curr-reading').value)||0;
  const units = curr - prev;
  document.getElementById('eb-units').value = units >= 0 ? units.toFixed(2) : '';
  calcEbAmount();
}

function calcEbAmount() {
  const units = parseFloat(document.getElementById('eb-units').value)||0;
  const rate = parseFloat(document.getElementById('eb-rate').value)||0;
  if(units && rate) document.getElementById('eb-amount').value = (units*rate).toFixed(2);
}

function toggleEbPayDate() {
  const status = document.getElementById('eb-payment-status').value;
  const field = document.getElementById('eb-pay-date-field');
  if(field) field.style.display = status==='paid' ? '' : 'none';
  if(status==='paid') {
    const pd = document.getElementById('eb-payment-date');
    if(pd && !pd.value) pd.value = new Date().toISOString().split('T')[0];
  }
}

async function saveElecBill() {
  const date = document.getElementById('eb-date').value;
  const meter_id = document.getElementById('eb-meter').value;
  const previous_reading = parseFloat(document.getElementById('eb-prev-reading').value)||0;
  const current_reading = parseFloat(document.getElementById('eb-curr-reading').value)||0;
  const rate_per_unit = parseFloat(document.getElementById('eb-rate').value)||0;
  const bill_amount = parseFloat(document.getElementById('eb-amount').value)||0;
  const payment_status = document.getElementById('eb-payment-status').value;
  const payment_date = document.getElementById('eb-payment-date').value||null;
  const note = document.getElementById('eb-note').value.trim();

  if(!date||!meter_id) { toast('Date and Meter required','error'); return; }
  if(current_reading < previous_reading) { toast('Current reading must be >= Previous reading','error'); return; }

  try {
    await api('POST','electricity_bills',withCompany({date,meter_id:parseInt(meter_id),previous_reading,current_reading,rate_per_unit,bill_amount,payment_status,payment_date,note}));
    toast('Bill saved!','success');
    clearElecForm();
    await fetchElecData();
  } catch(e) { toast('Error: '+e.message,'error'); }
}

function clearElecForm() {
  ['eb-prev-reading','eb-curr-reading','eb-units','eb-rate','eb-amount','eb-note','eb-payment-date'].forEach(id => {
    const el=document.getElementById(id); if(el) el.value='';
  });
  document.getElementById('eb-payment-status').value='unpaid';
  document.getElementById('eb-pay-date-field').style.display='none';
  const d=document.getElementById('eb-date');
  if(d) d.value=new Date().toISOString().split('T')[0];
}

function filterElecBills() {
  const q=(document.getElementById('eb-search')?.value||'').toLowerCase();
  const month=document.getElementById('eb-filter-month')?.value||'';
  const meterId=document.getElementById('eb-filter-meter')?.value||'';
  const status=document.getElementById('eb-filter-status')?.value||'';
  let data=allElecBills.filter(b=>{
    if(month && !b.date?.startsWith(month)) return false;
    if(meterId && String(b.meter_id)!==meterId) return false;
    if(status && b.payment_status!==status) return false;
    if(q){
      const m=allMeters.find(x=>x.id===b.meter_id);
      const s=`${b.date}${m?.meter_name||''}${b.bill_amount}${b.note||''}`.toLowerCase();
      if(!s.includes(q)) return false;
    }
    return true;
  });
  elecPage=1;
  renderElecBillsTable(data);
}

function renderElecBillsTable(data) {
  const tbody=document.getElementById('elecBillsTbody');
  if(!tbody) return;
  const isAdmin=currentUser?.role==='admin';
  const slice=data.slice((elecPage-1)*ELEC_PAGE_SIZE, elecPage*ELEC_PAGE_SIZE);
  const fmt=n=>n?'₹'+parseFloat(n||0).toLocaleString('en-IN',{minimumFractionDigits:2}):'—';

  tbody.innerHTML = slice.length ? slice.map((b,i)=>{
    const m=allMeters.find(x=>x.id===b.meter_id);
    const paid=b.payment_status==='paid';
    return`<tr>
      <td class="sno">${(elecPage-1)*ELEC_PAGE_SIZE+i+1}</td>
      <td>${fd(b.date)}</td>
      <td class="name-cell">${m?.meter_name||'—'}</td>
      <td>${parseFloat(b.previous_reading||0).toFixed(1)}</td>
      <td>${parseFloat(b.current_reading||0).toFixed(1)}</td>
      <td style="font-weight:700;color:var(--primary)">${parseFloat(b.units_consumed||0).toFixed(1)}</td>
      <td style="color:var(--muted)">₹${parseFloat(b.rate_per_unit||0).toFixed(2)}</td>
      <td style="font-weight:700;color:var(--danger)">${fmt(b.bill_amount)}</td>
      <td><span class="badge ${paid?'badge-cash':'badge-account'}">${paid?'✅ Paid':'❌ Unpaid'}</span></td>
      <td class="no-print">${isAdmin?`<button class="btn btn-danger btn-sm" onclick="deleteElecBill(${b.id})">🗑</button>`:'—'}</td>
    </tr>`;
  }).join('') : '<tr><td colspan="10" style="text-align:center;padding:30px;color:var(--muted)">No bills found</td></tr>';

  // Pagination
  const total=data.length;
  const pages=Math.ceil(total/ELEC_PAGE_SIZE);
  const pg=document.getElementById('elecPagination');
  if(pg){
    pg.innerHTML = pages>1 ? `<span style="color:var(--muted);font-size:0.82rem">${total} bills</span>
      ${Array.from({length:pages},(_,i)=>`<button class="pg-btn${elecPage===i+1?' active':''}" onclick="elecPage=${i+1};filterElecBills()">${i+1}</button>`).join('')}` : '';
  }
}

async function deleteElecBill(id) {
  if(!confirm('Delete this bill?')) return;
  try {
    await api('DELETE','electricity_bills',null,`id=eq.${id}`);
    toast('Deleted!','success');
    await fetchElecData();
  } catch(e) { toast('Error: '+e.message,'error'); }
}

function loadElecReport() {
  const month=document.getElementById('eb-report-month')?.value;
  const meterId=document.getElementById('eb-report-meter')?.value||'';
  const el=document.getElementById('elecReportContent');
  if(!month){ el.innerHTML=`<div class="empty-state"><div class="empty-icon">📅</div><div class="empty-title">Select a month</div></div>`; return; }
  let data=allElecBills.filter(b=>b.date?.startsWith(month));
  if(meterId) data=data.filter(b=>String(b.meter_id)===meterId);
  if(!data.length){ el.innerHTML=`<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">No data for this month</div></div>`; return; }

  const fmt=n=>'₹'+parseFloat(n||0).toLocaleString('en-IN',{minimumFractionDigits:2});
  const totalUnits=data.reduce((s,b)=>s+parseFloat(b.units_consumed||0),0);
  const totalAmt=data.reduce((s,b)=>s+parseFloat(b.bill_amount||0),0);
  const paidAmt=data.filter(b=>b.payment_status==='paid').reduce((s,b)=>s+parseFloat(b.bill_amount||0),0);
  const unpaidAmt=totalAmt-paidAmt;

  const meterMap={};
  data.forEach(b=>{
    const m=allMeters.find(x=>x.id===b.meter_id);
    const key=m?.meter_name||'Unknown';
    if(!meterMap[key]) meterMap[key]={bills:0,units:0,amount:0,paid:0,unpaid:0};
    meterMap[key].bills++;
    meterMap[key].units+=parseFloat(b.units_consumed||0);
    meterMap[key].amount+=parseFloat(b.bill_amount||0);
    if(b.payment_status==='paid') meterMap[key].paid+=parseFloat(b.bill_amount||0);
    else meterMap[key].unpaid+=parseFloat(b.bill_amount||0);
  });

  el.innerHTML=`
    <div class="report-summary">
      <div class="rsm"><div class="rl">Total Bills</div><div class="rv" style="color:var(--primary)">${data.length}</div></div>
      <div class="rsm"><div class="rl">Total Units</div><div class="rv" style="color:#0369a1">${totalUnits.toFixed(1)}</div></div>
      <div class="rsm"><div class="rl">Total Amount</div><div class="rv" style="color:var(--danger)">${fmt(totalAmt)}</div></div>
      <div class="rsm"><div class="rl">Paid</div><div class="rv" style="color:var(--success)">${fmt(paidAmt)}</div></div>
      <div class="rsm"><div class="rl">Unpaid</div><div class="rv" style="color:var(--warning)">${fmt(unpaidAmt)}</div></div>
    </div>
    <div style="padding:14px 20px 8px;font-size:0.85rem;font-weight:700;border-top:1px solid var(--border)">Meter Summary</div>
    <div class="table-wrap"><table>
      <thead><tr><th>Meter</th><th>Bills</th><th>Units</th><th>Amount</th><th>Paid</th><th>Unpaid</th></tr></thead>
      <tbody>${Object.entries(meterMap).map(([name,d])=>`<tr>
        <td class="name-cell">${name}</td>
        <td>${d.bills}</td>
        <td style="color:var(--primary);font-weight:700">${d.units.toFixed(1)}</td>
        <td style="color:var(--danger);font-weight:700">${fmt(d.amount)}</td>
        <td style="color:var(--success);font-weight:700">${fmt(d.paid)}</td>
        <td style="color:var(--warning);font-weight:700">${fmt(d.unpaid)}</td>
      </tr>`).join('')}</tbody>
    </table></div>
    <div style="padding:14px 20px 8px;font-size:0.85rem;font-weight:700;border-top:1px solid var(--border)">Detailed Bills</div>
    <div class="table-wrap"><table>
      <thead><tr><th>#</th><th>Date</th><th>Meter</th><th>Units</th><th>Amount</th><th>Status</th><th>Payment Date</th></tr></thead>
      <tbody>${data.sort((a,b)=>a.date.localeCompare(b.date)).map((b,i)=>{
        const m=allMeters.find(x=>x.id===b.meter_id);
        return`<tr>
          <td class="sno">${i+1}</td>
          <td>${fd(b.date)}</td>
          <td>${m?.meter_name||'—'}</td>
          <td style="font-weight:700;color:var(--primary)">${parseFloat(b.units_consumed||0).toFixed(1)}</td>
          <td style="font-weight:700;color:var(--danger)">${fmt(b.bill_amount)}</td>
          <td><span class="badge ${b.payment_status==='paid'?'badge-cash':'badge-account'}">${b.payment_status==='paid'?'✅ Paid':'❌ Unpaid'}</span></td>
          <td style="color:var(--muted)">${b.payment_date?fd(b.payment_date):'—'}</td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>`;
}

  tbody.innerHTML=allMeters.length ? allMeters.map((m,i)=>`<tr>
    <td class="sno">${i+1}</td>
    <td class="name-cell">${m.meter_name}</td>
    <td style="color:var(--muted)">${m.meter_number||'—'}</td>
    <td><span class="badge ${m.is_active?'badge-cash':'badge-account'}">${m.is_active?'✅ Active':'❌ Inactive'}</span></td>
    <td>
      <button class="btn btn-warning btn-sm" onclick="toggleMeterStatus(${m.id},${m.is_active})">${m.is_active?'Deactivate':'Activate'}</button>
      <button class="btn btn-danger btn-sm" onclick="deleteMeter(${m.id})">🗑</button>
    </td>
  </tr>`).join('') : '<tr><td colspan="5" style="text-align:center;padding:30px;color:var(--muted)">No meters found</td></tr>';
}

function showAddMeterModal(){ document.getElementById('addMeterModal').classList.remove('hidden'); }
function closeAddMeterModal(){
  document.getElementById('addMeterModal').classList.add('hidden');
  document.getElementById('new-meter-name').value='';
  document.getElementById('new-meter-number').value='';
}

async function saveMeter() {
  const name=document.getElementById('new-meter-name').value.trim();
  if(!name){ toast('Meter name required','error'); return; }
  const number=document.getElementById('new-meter-number').value.trim();
  try {
    await api('POST','meters',withCompany({meter_name:name,meter_number:number}));
    toast('Meter added!','success');
    closeAddMeterModal();
    await fetchElecData();
    renderMetersTable();
  } catch(e){ toast('Error: '+e.message,'error'); }
}

async function toggleMeterStatus(id, current) {
  try {
    await api('PATCH','meters',{is_active:!current},`id=eq.${id}`);
    toast('Updated!','success');
    await fetchElecData();
    renderMetersTable();
  } catch(e){ toast('Error: '+e.message,'error'); }
}

async function deleteMeter(id) {
  if(!confirm('Delete this meter? Bills linked to it will remain.')) return;
  try {
    await api('DELETE','meters',null,`id=eq.${id}`);
    toast('Deleted!','success');
    await fetchElecData();
    renderMetersTable();
  } catch(e){ toast('Error: '+e.message,'error'); }
}

</script>

function toggleSidebar(){
  const s=document.getElementById('sidebar');
  const o=document.getElementById('sidebarOverlay');
  if(!s)return;
  const open=s.classList.toggle('open');
  o.style.display=open?'block':'none';
}
function closeSidebar(){
  const s=document.getElementById('sidebar');
  const o=document.getElementById('sidebarOverlay');
  if(s)s.classList.remove('open');
  if(o)o.style.display='none';
}

// ── Mobile bottom nav ───────────────────────────────────────
async function updateMobileNav(mod){
  ['Husk','Cocopeat','Attendance','VehExp'].forEach(m=>{
    const el=document.getElementById('mbn'+m);
    if(el)el.classList.toggle('active',m.toLowerCase()===mod.toLowerCase()||(m==='VehExp'&&mod==='vehexp'));
  });
  const perms=currentUser?.permissions||{};
  const isAdmin=currentUser?.role==='admin';
  const mbnMap={mbnHusk:'husk',mbnCocopeat:'cocopeat',mbnAttendance:'attendance',mbnVehExp:'vehexp',mbnMachExp:'machexp',mbnElec:'elec'};
  Object.entries(mbnMap).forEach(([id,key])=>{
    const el=document.getElementById(id);
    if(el)el.style.display=(isAdmin||perms[key])?'flex':'none';
  });
}
